<!DOCTYPE html>
<html>
<head>
  <title>Koels Status</title>
  <style>
    body {
      margin:0;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(135deg,#0f172a,#1e293b,#334155,#0f172a);
      background-size: 400% 400%;
      animation: gradientBG 60s ease infinite;
      color:white;
    }

    @keyframes gradientBG {
      0% { background-position:0% 50%; }
      50% { background-position:100% 50%; }
      100% { background-position:0% 50%; }
    }

    /* SAME NAVBAR FOR ALL PAGES */
    .nav {
      padding:20px 40px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size:18px;
      font-weight:600;
      position: sticky;
      top:0;
    }

    .nav a {
      color:white;
      margin-left:20px;
      text-decoration:none;
    }

    .nav a:hover { text-decoration:underline; }
    .nav a:visited { color:white; }

    section {
      padding:80px 20px;
      text-align:center;
    }

    .card {
      margin:40px auto;
      width:450px;
      background: rgba(30,41,59,0.5);
      backdrop-filter: blur(25px);
      border-radius:20px;
      padding:30px;
    }

    .motd { color:#cbd5f5; }
    .players { color:#94a3b8; margin-top:10px; }
    .status { margin-top:10px; font-weight:600; }

    .dot {
      height:10px;
      width:10px;
      border-radius:50%;
      display:inline-block;
      margin-right:6px;
    }

    .online { color:#22c55e; }
    .offline { color:#ef4444; }
    .dot.online { background:#22c55e; }
    .dot.offline { background:#ef4444; }

    .info-box {
      margin-top:20px;
      background:rgba(30,41,59,0.5);
      display:inline-block;
      padding:20px 30px;
      border-radius:12px;
    }

    .info-box a,
    .info-box a:visited {
      color:#94a3b8;
      text-decoration:none;
    }

    .info-box a:hover { text-decoration:underline; }

    .footer {
      margin-top:30px;
      text-align:center;
      color:#94a3b8;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:6px;
    }

    .footer a {
      color:#94a3b8;
      text-decoration:none;
    }

    .github-logo {
      width:18px;
    }
  </style>
</head>
<body>

<div class="nav">
  koels.site
  <a href="index.html">Status</a>
  <a href="about.html">About Me</a>
  <a href="contact.html">Contact</a>
</div>

<section>
  <h2>Server Status</h2>

  <div class="card">
    <h3>koels.online</h3>
    <div id="motd" class="motd">Loading...</div>
    <div id="players" class="players"></div>
    <div id="statusText" class="status">Checking...</div>
  </div>

  <div class="info-box">
    Join using: <strong>koels.online</strong><br><br>
    Status from
    <a href="https://mcsrvstat.us/" target="_blank">MCSrvStat.us</a>
    and
    <a href="https://mcstatus.io/" target="_blank">MCStatus</a>
  </div>
</section>

<div class="footer">
  <a href="https://github.com/" target="_blank">
    <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" class="github-logo">
    Hosted on GitHub
  </a>
</div>

<script>
let lastSuccess = {
  online: false,
  players: { online: 0, max: 0 },
  motd: { html: "Loading..." }
};

// fetch with timeout (IMPORTANT FIX)
async function fetchWithTimeout(url, timeout = 5000){
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), timeout);

  try {
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(id);
    if(!res.ok) throw new Error();
    return await res.json();
  } catch {
    return null;
  }
}

function extractMotd(data){
  if(data?.motd?.html) return data.motd.html;
  if(data?.motd?.clean) return data.motd.clean;
  return "No MOTD";
}

async function getServerStatus(){
  const proxy = "https://api.allorigins.win/raw?url=";
  const url = encodeURIComponent("https://api.mcstatus.io/v2/status/java/koels.online");

  return await fetchWithTimeout(proxy + url, 5000);
}

async function updateStatus(){
  const motdEl = document.getElementById("motd");
  const playersEl = document.getElementById("players");
  const statusEl = document.getElementById("statusText");

  const data = await getServerStatus();

  // ❗ If fetch failed → DO NOT ERROR → use last good data
  if(!data){
    render(lastSuccess);
    return;
  }

  // save good data
  lastSuccess = data;

  render(data);
}

function render(data){
  const motdEl = document.getElementById("motd");
  const playersEl = document.getElementById("players");
  const statusEl = document.getElementById("statusText");

  const isOnline = data.online === true;

  if(isOnline){
    motdEl.innerHTML = extractMotd(data);
    playersEl.innerText = `${data.players?.online ?? 0} / ${data.players?.max ?? 0}`;
    statusEl.innerHTML = '<span class="dot online"></span>Online';
  } else {
    motdEl.innerText = "Server is offline";
    playersEl.innerText = "";
    statusEl.innerHTML = '<span class="dot offline"></span>Offline';
  }
}

updateStatus();
setInterval(updateStatus, 15000);
</script>

</body>
</html>
