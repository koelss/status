<!DOCTYPE html>
<html>
<head>
  <title>Koels Status</title>
  <style>
    body {
      margin:0;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(135deg,#0f172a,#1e293b,#334155,#0f172a);
      background-size: 400% 400%;
      animation: gradientBG 60s ease infinite;
      color:white;
    }

    @keyframes gradientBG {
      0% { background-position:0% 50%; }
      50% { background-position:100% 50%; }
      100% { background-position:0% 50%; }
    }

    .nav {
      padding:20px 40px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size:18px;
      font-weight:600;
      position: sticky;
      top:0;
    }

    .nav a {
      color:white;
      margin-left:20px;
      text-decoration:none;
    }

    .nav a:hover { text-decoration:underline; }
    .nav a:visited { color:white; }

    section {
      padding:80px 20px;
      text-align:center;
    }

    .card {
      margin:40px auto;
      width:450px;
      background: rgba(30,41,59,0.5);
      backdrop-filter: blur(25px);
      border-radius:20px;
      padding:30px;
      box-shadow:0 12px 50px rgba(0,0,0,0.5);
      border:1px solid rgba(255,255,255,0.08);
    }

    .motd { color:#cbd5f5; margin-top:10px; }
    .players { color:#94a3b8; margin-top:10px; }
    .status { margin-top:12px; font-weight:600; }

    .dot {
      height:10px;
      width:10px;
      border-radius:50%;
      display:inline-block;
      margin-right:6px;
    }

    .dot.online { background:#22c55e; }
    .dot.offline { background:#ef4444; }

    .timer-text {
      margin-top:12px;
      color:#94a3b8;
      font-size:14px;
    }

    .progress-bar {
      width:100%;
      height:6px;
      background: rgba(255,255,255,0.1);
      border-radius:10px;
      overflow:hidden;
      margin-top:8px;
    }

    .progress-fill {
      height:100%;
      background: linear-gradient(90deg,#22c55e,#4ade80);
      width:0%;
      transition: width 1s linear;
    }

    .info-box {
      margin-top:20px;
      background:rgba(30,41,59,0.5);
      display:inline-block;
      padding:20px 30px;
      border-radius:12px;
    }

    .info-box a,
    .info-box a:visited {
      color:#94a3b8;
      text-decoration:none;
    }

    .info-box a:hover {
      text-decoration:underline;
    }

    .footer {
      margin-top:40px;
      font-size:0.85rem;
      color:#94a3b8;
      text-align:center;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
    }

    .footer a {
      color:#94a3b8;
      text-decoration:none;
      display:flex;
      align-items:center;
      gap:6px;
    }

    .footer a:hover { text-decoration:underline; }

    .github-logo {
      width:18px;
      height:18px;
    }
  </style>
</head>
<body>

<div class="nav">
  koels.site
  <a href="index.html">Status</a>
  <a href="about.html">About Me</a>
  <a href="contact.html">Contact</a>
</div>

<section>
  <h2>Server Status</h2>

  <div class="card">
    <h3>koels.online</h3>
    <div id="motd" class="motd">Loading...</div>
    <div id="players" class="players"></div>
    <div id="statusText" class="status">Checking...</div>

    <div class="timer-text" id="timerText"></div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="info-box">
    Join using: <strong>koels.online</strong><br><br>
    Status from <a href="https://mcapi.us/" target="_blank">MCAPI</a>
  </div>
</section>

<div class="footer">
  <a href="https://github.com/" target="_blank">
    <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" class="github-logo">
    <span>Hosted on GitHub</span>
  </a>
</div>

<script>
const REFRESH_INTERVAL = 180;
let lastCycle = null;

// fetch
async function fetchStatus(){
  try {
    const res = await fetch("https://mcapi.us/server/status?ip=koels.online");
    if(!res.ok) throw new Error();
    return await res.json();
  } catch {
    return null;
  }
}

// render
function render(data){
  const motd = document.getElementById("motd");
  const players = document.getElementById("players");
  const status = document.getElementById("statusText");

  if(!data){
    status.innerHTML = '<span class="dot offline"></span>Error';
    return;
  }

  if(data.online){
    motd.innerText = data.motd || "No MOTD";
    players.innerText = `${data.players.now} / ${data.players.max}`;
    status.innerHTML = '<span class="dot online"></span>Online';
  } else {
    motd.innerText = "Server is offline";
    players.innerText = "";
    status.innerHTML = '<span class="dot offline"></span>Offline';
  }
}

// update
async function update(){
  const statusEl = document.getElementById("statusText");
  statusEl.innerHTML = '<span class="dot online"></span>Refreshing...';

  const data = await fetchStatus();
  render(data);
}

// synced timer (FIXED)
function updateTimer(){
  const now = Math.floor(Date.now() / 1000);

  const currentCycle = Math.floor(now / REFRESH_INTERVAL);
  const remaining = REFRESH_INTERVAL - (now % REFRESH_INTERVAL);
  const progress = ((REFRESH_INTERVAL - remaining) / REFRESH_INTERVAL) * 100;

  document.getElementById("timerText").innerText = `Refreshing in ${remaining}s`;
  document.getElementById("progressFill").style.width = progress + "%";

  if(currentCycle !== lastCycle){
    lastCycle = currentCycle;
    update();
  }
}

// start
update();
setInterval(updateTimer, 1000);
</script>

</body>
</html>
