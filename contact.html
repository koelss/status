<!DOCTYPE html>
<html>
<head>
  <title>Contact - Koels</title>
  <style>
    body {
      margin:0;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(135deg,#0f172a,#1e293b,#334155,#0f172a);
      background-size: 400% 400%;
      animation: gradientBG 60s ease infinite;
      color:white;
    }

    @keyframes gradientBG {
      0% { background-position:0% 50%; }
      50% { background-position:100% 50%; }
      100% { background-position:0% 50%; }
    }

    /* SAME NAVBAR */
    .nav {
      padding:20px 40px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size:18px;
      font-weight:600;
      position: sticky;
      top:0;
    }

    .nav a {
      color:white;
      margin-left:20px;
      text-decoration:none;
    }

    .nav a:hover { text-decoration:underline; }
    .nav a:visited { color:white; }

    section {
      padding:80px 20px;
      text-align:center;
    }

    .card {
      max-width:600px;
      margin:40px auto;
      padding:30px;
      background:rgba(30,41,59,0.5);
      border-radius:20px;
      backdrop-filter: blur(25px);
    }

    /* FIXED FOOTER (matches other pages) */
    .footer {
      margin-top:20px;
      font-size:0.85rem;
      color:#94a3b8;
      text-align:center;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:6px;
    }

    .footer a {
      color:#94a3b8;
      text-decoration:none;
    }

    .footer a:hover { text-decoration:underline; }

    .github-logo {
      width:18px;
      height:18px;
    }
  </style>
</head>
<body>

<div class="nav">
  koels.site
  <a href="index.html">Status</a>
  <a href="about.html">About Me</a>
  <a href="contact.html">Contact</a>
</div>

<section>
  <h2>Contact Me</h2>
  <div class="card">
    <p>
      Discord: <strong>@koels</strong><br>
      Email: <strong>kyle@koels.site</strong>
    </p>
  </div>
</section>

<div class="footer">
  <a href="https://github.com/" target="_blank">
    <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" class="github-logo">
    Hosted on GitHub
  </a>
</div>

</body>
</html>
