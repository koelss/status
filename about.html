<!DOCTYPE html>

<head>

  <style>
    body {
      margin:0;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(135deg,#0f172a,#1e293b,#334155,#0f172a);
      background-size: 400% 400%;
      animation: gradientBG 60s ease infinite;
      color:white;
      scroll-behavior: smooth;
    }
    @keyframes gradientBG {
      0% { background-position:0% 50%; }
      50% { background-position:100% 50%; }
      100% { background-position:0% 50%; }
    }

    .nav {
      padding:20px 40px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size:18px;
      font-weight:600;
      position: sticky;
      top:0;
      z-index:100;
    }
    .nav a { color:white; margin-left:20px; text-decoration:none; }
    .nav a:hover { text-decoration:underline; }
    .nav .site-name { color:#22c55e; }

    section { padding:80px 20px; text-align:center; }

    .card {
      max-width:600px;
      margin:40px auto;
      background: linear-gradient(135deg, rgba(30,41,59,0.6), rgba(15,23,42,0.5));
      backdrop-filter: blur(25px);
      border-radius:20px;
      padding:30px;
      text-align:center;
      box-shadow:0 12px 50px rgba(0,0,0,0.5);
      border:1px solid rgba(255,255,255,0.08);
    }

    .footer { margin-top:15px; font-size:0.85rem; color:#94a3b8; text-align:center; }
    a { color:#94a3b8; text-decoration:none; }
    a:visited { color:#94a3b8; }
    a:hover { text-decoration:underline; }
  </style>
</head>
<body>
<div class="nav">
  <span class="site-name">koels.site</span>
  <a href="index.html">Status</a>
  <a href="about.html">About Me</a>
  <a href="contact.html">Contact</a>
</div>

<section>

  <div class="card">
    <p>
      Hey! I’m Kyle, the creator of this site.<br>
      I enjoy building PCs, making/hosting Minecraft servers, and experimenting with tech!
    </p>
  </div>
</section>

<div class="footer">
  <a href="https://github.com/" target="_blank">
    <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" width="20" height="20" style="vertical-align:middle; margin-right:5px;"> Hosted on GitHub
  </a>
</div>
</body>
</html>
